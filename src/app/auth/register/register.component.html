<div class="row">
    <div class="col s12 m6 offset-m3">
        <h2 class="header center">Inscription</h2>

        <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
            <div class="card-panel">
                <div class="form-group">
                    <label for="username">Pseudo</label>
                    <input type="text" class="form-control" id="username" name="username" required [(ngModel)]="username">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required [(ngModel)]="email">
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" class="form-control" id="password" name="password" required minlength="6"
                        [(ngModel)]="password" #passwordField="ngModel">
                    <div [hidden]="passwordField.valid || passwordField.pristine" class="card-panel red accent-3">
                        Mot de passe obligatoire (6 caractères minimum).
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirmer le mot de passe</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required minlength="6"
                        [(ngModel)]="confirmPassword" #confirmPasswordField="ngModel">
                    <div [hidden]="confirmPasswordField.valid || confirmPasswordField.pristine" class="card-panel red accent-3">
                        Confirmation du mot de passe obligatoire.
                    </div>
                </div>

                @if (errorMessage) {
                <div class="card-panel red accent-3">
                    {{ errorMessage }}
                </div>
                }
            </div>

            <div class="center section">
                <button type="submit" class="btn waves-effect waves-light teal darken-2" [disabled]="!registerForm.form.valid">
                    S'inscrire
                </button>
                <a routerLink="/login" class="btn waves-effect waves-light grey darken-2">Déjà un compte</a>
            </div>
        </form>
    </div>
</div>
