<div class="container auth-page">
    <div class="page-header">
        <h2>Connexion</h2>
    </div>

    <p class="auth-hint">
        Compte de test : ash@pokemon.fr / mot de passe : pokemon123
    </p>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="auth-card">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" class="form-control" id="email" name="email" required [(ngModel)]="email">
        </div>

        <div class="form-group">
            <label for="password">Mot de passe</label>
            <input type="password" class="form-control" id="password" name="password" required minlength="6"
                [(ngModel)]="password" #passwordField="ngModel">
            @if (!passwordField.valid && !passwordField.pristine) {
            <div class="auth-error">
                Mot de passe obligatoire (6 caractères minimum).
            </div>
            }
        </div>

        @if (errorMessage) {
        <div class="auth-error">
            {{ errorMessage }}
        </div>
        }

        <div class="center section">
            <button type="submit" class="btn waves-effect waves-light btn-nintendo" [disabled]="!loginForm.form.valid">
                Se connecter
            </button>
            <a routerLink="/register" class="btn waves-effect waves-light btn-nintendo-secondary">Créer un compte</a>
        </div>
    </form>
</div>
