<div class="row">
    <div class="col s12 m6 offset-m3">
        <h2 class="header center">Connexion</h2>
        <p class="center grey-text text-darken-1">
            Compte de test : ash@pokemon.fr / mot de passe : pokemon123
        </p>

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
            <div class="card-panel">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required [(ngModel)]="email">
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" class="form-control" id="password" name="password" required minlength="6"
                        [(ngModel)]="password" #passwordField="ngModel">
                    <div [hidden]="passwordField.valid || passwordField.pristine" class="card-panel red accent-3">
                        Mot de passe obligatoire (6 caractères minimum).
                    </div>
                </div>

                @if (errorMessage) {
                <div class="card-panel red accent-3">
                    {{ errorMessage }}
                </div>
                }
            </div>

            <div class="center section">
                <button type="submit" class="btn waves-effect waves-light teal darken-2" [disabled]="!loginForm.form.valid">
                    Se connecter
                </button>
                <a routerLink="/register" class="btn waves-effect waves-light grey darken-2">Créer un compte</a>
            </div>
        </form>
    </div>
</div>
