<nav class="nintendo-nav">
    <div class="nav-wrapper container">
        <a routerLink="/pokemon/all" class="brand-logo">
            <span class="brand-pokeball" aria-hidden="true"></span>
            MyPokédex
        </a>
        <ul class="right hide-on-med-and-down">
            @if (authService.currentUser$ | async; as user) {
            <li class="nav-user-badge">
                <i class="material-icons">person</i>
                <span>{{ user.username }}</span>
            </li>
            <li><a (click)="logout()">Déconnexion</a></li>
            } @else {
            <li><a routerLink="/login">Connexion</a></li>
            <li><a routerLink="/register">Inscription</a></li>
            }
        </ul>
    </div>
</nav>

<main class="main-content">
    <div class="page-transition-host">
        <router-outlet />
    </div>
</main>

<footer class="nintendo-footer">
    <div class="container center-align">
        <p>MyPokemons</p>
    </div>
</footer>
