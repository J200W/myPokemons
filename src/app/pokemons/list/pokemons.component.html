<div class="container">
    <div class="page-header">
        <h1>Liste de Pokémons</h1>
    </div>

    <search-pokemon></search-pokemon>

    @if (pokemons) {
    <div class="actions-bar section">
        <a routerLink="/pokemon/add" class="btn waves-effect waves-light btn-nintendo">
            <i class="material-icons left">add</i>Ajouter un Pokémon
        </a>
        <button type="button" (click)="toggleSelectMode()"
            class="btn waves-effect waves-light btn-nintendo-blue"
            [class.pulse]="selectMode">
            <i class="material-icons left">compare</i>
            {{ selectMode ? 'Annuler' : 'Comparer' }}
        </button>
        <a routerLink="/pokemon/favorites" id="btn-liste-favoris" class="btn waves-effect waves-light btn-nintendo-yellow">
            <i class="material-icons left">favorite</i>Favoris
        </a>
    </div>

    <div class="row">
        @for (pokemon of pokemons; track pokemon.id) {
        <div class="col s6 m4">
            <pkmnBorderCard class="card horizontal"
                [selected]="selectMode && isSelected(pokemon.id)"
                (click)="onCardClick(pokemon)">

                <div class="card-image">
                    <img [src]="pokemon.picture" alt="img">
                </div>
                <div class="card-stacked">
                    <div class="card-content">
                        <p>{{ pokemon.name }}</p>
                        <p><small>{{ pokemon.created | date: "dd/MM/yy"}}</small></p>
                        @for (type of pokemon.types; track $index) {
                        <span class="{{ type | pokemonTypeColor }}">{{type}}</span>
                        }
                    </div>
                </div>

            </pkmnBorderCard>
        </div>
        }
    </div>
    }
</div>
