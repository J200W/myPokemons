@if (pokemon){

<form (ngSubmit)="onSubmit()" #pokemonForm="ngForm">

    <div class="row">
        <div class="col s8 offset-s2">
            <div class="card-panel">
                <div class="form-group">
                    <label for="name">Nom</label>
                    <input type="text" class="form-control" id="name" name="name" required [(ngModel)]="pokemon.name"
                        #name="ngModel" pattern="^[a-zA-Zàéèç]{1,30}$">

                    <div [hidden]="name.valid || name.pristine" class="card-panel red accent-3">
                        Le nom du pokémon est requis (1-30)
                    </div>


                </div>
                <div class="form-group">
                    <label for="picture">URL de l'image</label>
                    <input type="url" class="form-control" id="picture" name="picture" required [(ngModel)]="pokemon.picture"
                        #name="ngModel">
                </div>
                <div class="form-group">
                    <label for="rarity">Rareté</label>
                    <input type="text" class="form-control" id="rarity" name="rarity" required [(ngModel)]="pokemon.rarity"
                        #rarity="ngModel" pattern="^[\\*+$]{1,5}">

                    <div [hidden]="rarity.valid || rarity.pristine" class="card-panel red accent-3">
                        La rareté ne doit contenir que des étoiles (*) et doit être comprise entre 1 et 5.
                    </div>
                </div>
                <div class="form-group">
                    <label for="hp">Point de vie</label>
                    <input type="number" class="form-control" id="hp" name="hp" required [(ngModel)]="pokemon.hp"
                        #hp="ngModel" pattern="^[0-9]{1,3}$">

                    <div [hidden]="hp.valid || hp.pristine" class="card-panel red accent-3">
                        Les points de vie du pokémon est compris entre 1 et 999
                    </div>
                </div>
                <div class="form-group">
                    <label for="cp">Dégâts</label>
                    <input type="number" class="form-control" id="cp" name="cp" required [(ngModel)]="pokemon.cp"
                        #cp="ngModel" pattern="^[0-9]{1,3}$">

                    <div [hidden]="cp.valid || cp.pristine" class="card-panel red accent-3">
                        Les dégâts du pokémon est compris entre 1 et 999
                    </div>
                </div>
                <form class="form-group">
                    <label>Types</label>
                    @for (type of types; track type) {
                    <p>
                        <label [for]="type">
                            <input type="checkbox" [id]="type" [value]="type" [checked]="hasType(type)"
                                [disabled]="!isTypesValid(type)" (change)="selectType($event, type)" />
                            <span>
                                <div class="{{ type | pokemonTypeColor }}">{{ type }}</div>
                            </span>
                        </label>
                    </p>
                    }
                </form>
            </div>
        </div>
    </div>
    <div class="center section">
        <button [disabled]="!pokemonForm.form.valid" class="btn waves-effect waves-light">Valider</button>
        <a (click)="goBack()" class="btn waves-effect waves-light">Retour</a>
    </div>
</form>

}
